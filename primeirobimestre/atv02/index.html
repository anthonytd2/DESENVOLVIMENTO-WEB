<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de Cadastro</title>
</head>
<body>

    <form>
        <fieldset>
            <legend>Crie sua Conta</legend>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" minlength="8" required><br><br>

            <strong>Gênero</strong><br>
            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label>
            
            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label><br><br>

            <label for="biografia">Biografia:</label><br>
            <textarea id="biografia" name="biografia" rows="5" placeholder="Escreva um pouco sobre você..."></textarea><br><br>

            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Concordo com os termos de uso</label><br><br>

            <button type="submit">Enviar Cadastro</button>

        </fieldset>
    </form>

</body>
</html>
